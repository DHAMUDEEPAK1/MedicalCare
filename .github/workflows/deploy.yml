name: Deploy MedicalCare Frontend to Cloud Run
# Trigger: Attempt with local helper key

on:
  push:
    branches:
      - main          # trigger on push to main branch
    paths:
      - 'frontend/**' # only when frontend files change

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: medicalcare-frontend
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/medicalcare-frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation (optional)

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ───────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ──────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to push to GCR ───────────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────
      - name: Build Docker image
        working-directory: ./frontend
        run: |
          docker build \
            --build-arg VITE_CANISTER_ID_BACKEND="${{ secrets.VITE_CANISTER_ID_BACKEND }}" \
            --build-arg VITE_BACKEND_HOST="${{ secrets.VITE_BACKEND_HOST }}" \
            --build-arg VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}" \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      # ── 6. Push image to Google Container Registry ────────────────────────
      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ github.sha }} \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --quiet

      # ── 8. Show deployed URL ──────────────────────────────────────────────
      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)')
          echo "🚀 Deployed to: $URL"
